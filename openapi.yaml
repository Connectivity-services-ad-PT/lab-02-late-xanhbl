openapi: 3.1.0
info:
  title: Smart Campus Access Gate API
  version: 1.0.0
  description: |
    Hop dong REST dong bo cho Pair 03 cua Smart Campus:
    Core Business (Consumer) truy van Access Gate (Provider) de audit log quet the,
    lay trang thai cong va tra cuu thong tin the.
  contact:
    name: FIT4110 Pair 03
    email: access-gate@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.smart-campus.local/access-gate
    description: Moi truong tich hop gia dinh
tags:
  - name: health
    description: Theo doi trang thai Access Gate service
  - name: access-logs
    description: Audit log ra vao
  - name: gates
    description: Trang thai cong vat ly
  - name: cards
    description: Thong tin va trang thai the
security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getAccessGateHealth
      summary: Kiem tra trang thai Access Gate service
      description: Endpoint khong yeu cau xac thuc, dung cho health check cua he thong.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service dang hoat dong
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                healthy:
                  value:
                    status: ok
                    service: access-gate
                    time: '2026-06-18T08:00:00Z'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /access/logs/recent:
    get:
      operationId: listRecentAccessLogs
      summary: Lay danh sach access log gan day
      description: |
        Core Business dung endpoint nay de audit va dong bo cac lan quet the gan day.
        Danh sach duoc sap xep giam dan theo occurredAt.
      tags: [access-logs]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/FromTime'
        - $ref: '#/components/parameters/ToTime'
        - $ref: '#/components/parameters/GateIdQuery'
        - $ref: '#/components/parameters/CardIdQuery'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Danh sach access log theo bo loc
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogPage'
              examples:
                firstPage:
                  value:
                    items:
                      - id: 0197a41f-9f20-72e0-a815-8a50eafdb001
                        gateId: GATE-01
                        direction: ENTRY
                        decision: ALLOW
                        occurredAt: '2026-06-18T07:45:16Z'
                        operatorNote: Khong co ghi chu
                        correlationId: 0197a41f-9f20-72e0-a815-8a50eafdb999
                        identity:
                          identityType: CARD
                          cardId: CARD-2026-000123
                          holderName: Nguyen Van A
                          cardStatus: ACTIVE
                    nextCursor: CURSOR-DEMO-NEXT
                    hasMore: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /access/logs/{logId}:
    get:
      operationId: getAccessLogById
      summary: Lay chi tiet mot access log
      description: Core Business dung khi can kiem tra day du mot lan quet the cu the.
      tags: [access-logs]
      parameters:
        - $ref: '#/components/parameters/LogId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Access log duoc tim thay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLog'
              examples:
                deniedEntry:
                  value:
                    id: 0197a41f-9f20-72e0-a815-8a50eafdb002
                    gateId: GATE-02
                    direction: ENTRY
                    decision: DENY
                    occurredAt: '2026-06-18T07:49:30Z'
                    operatorNote: The da bi khoa theo chinh sach
                    correlationId: 0197a41f-9f20-72e0-a815-8a50eafdb998
                    identity:
                      identityType: CARD
                      cardId: CARD-2026-000987
                      holderName: Tran Thi B
                      cardStatus: BLOCKED
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /gates/{gateId}/status:
    get:
      operationId: getGateStatus
      summary: Lay trang thai hien tai cua cong
      description: Core Business kiem tra tinh trang van hanh cua mot cong truoc khi audit hoac xu ly su co.
      tags: [gates]
      parameters:
        - $ref: '#/components/parameters/GateId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Trang thai cong hien tai
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateStatus'
              examples:
                onlineGate:
                  value:
                    gateId: GATE-01
                    status: ONLINE
                    doorState: CLOSED
                    lastSeenAt: '2026-06-18T07:50:00Z'
                    currentSessionId: 0197a41f-9f20-72e0-a815-8a50eafdb222
                    firmwareVersion: 2.4.1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cards/{cardId}:
    get:
      operationId: getCardById
      summary: Tra cuu thong tin the
      description: Core Business dung de kiem tra trang thai, chu the va thoi han the khi audit access log.
      tags: [cards]
      parameters:
        - $ref: '#/components/parameters/CardId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: The duoc tim thay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
              examples:
                activeCard:
                  value:
                    cardId: CARD-2026-000123
                    holderId: 0197a41f-9f20-72e0-a815-8a50eafdb111
                    holderName: Nguyen Van A
                    status: ACTIVE
                    issuedAt: '2026-01-05T00:00:00Z'
                    expiresAt: '2027-01-05T23:59:59Z'
                    lastUsedAt: '2026-06-18T07:45:16Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    LogId:
      name: logId
      in: path
      required: true
      description: UUID cua lan quet the.
      schema:
        type: string
        format: uuid
    GateId:
      name: gateId
      in: path
      required: true
      description: Ma cong theo chuan GATE-NN.
      schema:
        type: string
        pattern: '^GATE-[0-9]{2}$'
    CardId:
      name: cardId
      in: path
      required: true
      description: Ma the theo chuan CARD-YYYY-NNNNNN.
      schema:
        type: string
        pattern: '^CARD-[0-9]{4}-[0-9]{6}$'
    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor lay trang tiep theo; null hoac khong truyen nghia la trang dau.
      schema:
        oneOf:
          - type: string
            minLength: 1
            maxLength: 200
          - type: 'null'
    Limit:
      name: limit
      in: query
      required: false
      description: So log toi da tren mot trang.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    FromTime:
      name: from
      in: query
      required: false
      description: Chi lay log co occurredAt lon hon hoac bang thoi diem nay.
      schema:
        oneOf:
          - type: string
            format: date-time
          - type: 'null'
    ToTime:
      name: to
      in: query
      required: false
      description: Chi lay log co occurredAt nho hon hoac bang thoi diem nay.
      schema:
        oneOf:
          - type: string
            format: date-time
          - type: 'null'
    GateIdQuery:
      name: gateId
      in: query
      required: false
      description: Loc theo mot cong.
      schema:
        oneOf:
          - type: string
            pattern: '^GATE-[0-9]{2}$'
          - type: 'null'
    CardIdQuery:
      name: cardId
      in: query
      required: false
      description: Loc theo mot the.
      schema:
        oneOf:
          - type: string
            pattern: '^CARD-[0-9]{4}-[0-9]{6}$'
          - type: 'null'
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: UUID do Consumer phat sinh de lien ket log giua cac service.
      schema:
        oneOf:
          - type: string
            format: uuid
          - type: 'null'

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: access-gate
        time:
          type: string
          format: date-time

    AccessLogPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, hasMore]
      properties:
        items:
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: '#/components/schemas/AccessLog'
        nextCursor:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 200
            - type: 'null'
        hasMore:
          type: boolean

    AccessLog:
      type: object
      additionalProperties: false
      required: [id, gateId, direction, decision, occurredAt, operatorNote, correlationId, identity]
      properties:
        id:
          type: string
          format: uuid
        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'
        direction:
          type: string
          enum: [ENTRY, EXIT]
        decision:
          type: string
          enum: [ALLOW, DENY]
        occurredAt:
          type: string
          format: date-time
        operatorNote:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 300
            - type: 'null'
        correlationId:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        identity:
          $ref: '#/components/schemas/AccessIdentity'

    AccessIdentity:
      oneOf:
        - $ref: '#/components/schemas/CardIdentity'
        - $ref: '#/components/schemas/TemporaryPassIdentity'
      discriminator:
        propertyName: identityType
        mapping:
          CARD: '#/components/schemas/CardIdentity'
          TEMPORARY_PASS: '#/components/schemas/TemporaryPassIdentity'

    CardIdentity:
      type: object
      additionalProperties: false
      required: [identityType, cardId, holderName, cardStatus]
      properties:
        identityType:
          type: string
          const: CARD
        cardId:
          type: string
          pattern: '^CARD-[0-9]{4}-[0-9]{6}$'
        holderName:
          type: string
          minLength: 2
          maxLength: 120
        cardStatus:
          $ref: '#/components/schemas/CardStatus'

    TemporaryPassIdentity:
      type: object
      additionalProperties: false
      required: [identityType, passId, visitorName, validUntil]
      properties:
        identityType:
          type: string
          const: TEMPORARY_PASS
        passId:
          type: string
          pattern: '^PASS-[0-9]{4}-[0-9]{6}$'
        visitorName:
          type: string
          minLength: 2
          maxLength: 120
        validUntil:
          type: string
          format: date-time

    GateStatus:
      type: object
      additionalProperties: false
      required: [gateId, status, doorState, lastSeenAt, currentSessionId, firmwareVersion]
      properties:
        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'
        status:
          type: string
          enum: [ONLINE, OFFLINE, MAINTENANCE, FAULT]
        doorState:
          type: string
          enum: [OPEN, CLOSED, LOCKED, UNKNOWN]
        lastSeenAt:
          type: string
          format: date-time
        currentSessionId:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        firmwareVersion:
          type: string
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'

    Card:
      type: object
      additionalProperties: false
      required: [cardId, holderId, holderName, status, issuedAt, expiresAt, lastUsedAt]
      properties:
        cardId:
          type: string
          pattern: '^CARD-[0-9]{4}-[0-9]{6}$'
        holderId:
          type: string
          format: uuid
        holderName:
          type: string
          minLength: 2
          maxLength: 120
        status:
          $ref: '#/components/schemas/CardStatus'
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        lastUsedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'

    CardStatus:
      type: string
      enum: [ACTIVE, BLOCKED, EXPIRED, LOST, REVOKED]

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, detail, instance, errors]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
          minLength: 3
          maxLength: 120
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          oneOf:
            - type: string
              maxLength: 500
            - type: 'null'
        instance:
          oneOf:
            - type: string
              format: uri-reference
            - type: 'null'
        errors:
          type: array
          minItems: 0
          maxItems: 20
          items:
            $ref: '#/components/schemas/ProblemFieldError'

    ProblemFieldError:
      type: object
      additionalProperties: false
      required: [field, code, message]
      properties:
        field:
          type: string
          minLength: 1
          maxLength: 80
        code:
          type: string
          minLength: 2
          maxLength: 80
        message:
          type: string
          minLength: 3
          maxLength: 200

  responses:
    BadRequest:
      description: Request co path, query hoac header sai dinh dang.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidCardId:
              value:
                type: https://smart-campus.local/problems/validation
                title: Request khong hop le
                status: 400
                detail: cardId khong dung dinh dang CARD-YYYY-NNNNNN
                instance: /cards/CARD-INVALID
                errors:
                  - field: cardId
                    code: PATTERN_MISMATCH
                    message: cardId phai co dang CARD-YYYY-NNNNNN
    Unauthorized:
      description: Thieu, het han hoac sai Bearer token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            missingToken:
              value:
                type: https://smart-campus.local/problems/unauthorized
                title: Chua xac thuc
                status: 401
                detail: Thieu Bearer token
                instance: /access/logs/recent
                errors: []
    Forbidden:
      description: Token hop le nhung khong co scope access-gate.read.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            insufficientScope:
              value:
                type: https://smart-campus.local/problems/forbidden
                title: Khong du quyen
                status: 403
                detail: Token khong co scope access-gate.read
                instance: /gates/GATE-01/status
                errors: []
    NotFound:
      description: Access log, gate hoac card khong ton tai.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            cardNotFound:
              value:
                type: https://smart-campus.local/problems/not-found
                title: Khong tim thay du lieu
                status: 404
                detail: Khong tim thay card CARD-2026-999999
                instance: /cards/CARD-2026-999999
                errors: []
    UnprocessableEntity:
      description: Request dung JSON/schema nhung bo loc hoac dieu kien nghiep vu khong hop le.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidTimeRange:
              value:
                type: https://smart-campus.local/problems/business-rule
                title: Dieu kien nghiep vu khong hop le
                status: 422
                detail: from phai nho hon hoac bang to
                instance: /access/logs/recent
                errors:
                  - field: from
                    code: INVALID_TIME_RANGE
                    message: from phai nho hon hoac bang to
    InternalServerError:
      description: Loi khong mong muon phia Access Gate service.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            unexpected:
              value:
                type: https://smart-campus.local/problems/internal
                title: Loi he thong
                status: 500
                detail: Access Gate tam thoi khong xu ly duoc yeu cau
                instance: /access/logs/recent
                errors: []
